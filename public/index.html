<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roast My Code</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Header -->
    <header class="site-header">
      <div class="flame-strip"></div>
      <div class="container py-4">
        <div class="d-flex align-items-center gap-3">
          <span class="fire-icon"></span>
          <div>
            <h1 class="site-title mb-0">ROAST MY CODE</h1>
            <p class="site-sub mb-0">Paste it. Brace yourself.</p>
          </div>
        </div>
      </div>
    </header>

    <!-- Main -->
    <main class="container py-5">
      <div class="row g-4">
        <!-- Left: Input -->
        <div class="col-lg-6">
          <div class="card code-card h-100">
            <div class="card-header d-flex align-items-center gap-2">
              <span class="dot red"></span>
              <span class="dot yellow"></span>
              <span class="dot green"></span>
              <span class="ms-2 card-label">your_code.txt</span>
            </div>
            <div class="card-body d-flex flex-column">
              <textarea
                id="codeInput"
                class="code-textarea flex-grow-1"
                placeholder="// Paste your code here...&#10;// Don't worry, we've seen worse. (Maybe.)"
                spellcheck="false"
              ></textarea>
              <div class="mt-3 d-flex gap-2 align-items-center">
                <button
                  id="roastBtn"
                  class="btn btn-roast flex-grow-1"
                  onclick="roastCode()"
                >
                  <span class="btn-text">ROAST IT</span>
                  <span class="btn-loading d-none">
                    <span class="spinner-border spinner-border-sm me-2"></span
                    >Roasting...
                  </span>
                </button>
                <button
                  class="btn btn-clear"
                  onclick="clearAll()"
                  title="Clear"
                >
                  ✕
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Right: Output -->
        <div class="col-lg-6">
          <div
            id="placeholder"
            class="placeholder-panel h-100 d-flex align-items-center justify-content-center flex-column"
          >
            <div class="placeholder-icon"></div>
            <p class="placeholder-text">
              Your roast will appear here.<br />If you dare.
            </p>
          </div>

          <div id="results" class="d-none d-flex flex-column gap-3 h-100">
            <!-- Roast -->
            <div class="result-card roast-card">
              <div class="result-header">
                <span class="result-icon"></span>
                <span class="result-title">THE ROAST</span>
              </div>
              <div id="roastText" class="result-body"></div>
            </div>

            <!-- Suggestions -->
            <div class="result-card suggest-card">
              <div class="result-header">
                <span class="result-icon"></span>
                <span class="result-title">SUGGESTIONS</span>
              </div>
              <div id="suggestText" class="result-body"></div>
            </div>

            <!-- Explanation -->
            <div class="result-card explain-card">
              <div class="result-header">
                <span class="result-icon"></span>
                <span class="result-title">EXPLANATION</span>
              </div>
              <div id="explainText" class="result-body"></div>
            </div>
          </div>

          <!-- Error -->
          <div id="errorBox" class="error-box d-none mt-2">
            <span></span> <span id="errorMsg"></span>
          </div>
        </div>
      </div>
    </main>

    <footer class="site-footer text-center py-3">
      <span
        >Built with ☕ and zero mercy &nbsp;|&nbsp; Powered by
        <strong>Groq AI</strong></span
      >
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
